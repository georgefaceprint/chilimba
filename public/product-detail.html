<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Product Details - Chilimba</title>
  <meta name="theme-color" content="#15803d">
  <link rel="manifest" href="/manifest.json">
  <link href="/assets/css/tailwind.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { 
      font-family: 'Inter', sans-serif; 
      -webkit-tap-highlight-color: transparent;
      background-color: #f8fafc; /* slightly lighter than home for premium feel */
    }
    
    /* Smooth animations */
    .btn-press:active { transform: scale(0.95); transition: transform 0.1s; }
    
    /* Custom Scrollbar for horizontal lists */
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* Product image blend for white backgrounds */
    .product-image { mix-blend-mode: multiply; }
    
    /* Selector styles */
    .variant-btn.selected {
      border-color: #15803d;
      background-color: #15803d;
      color: white;
    }
    
    .color-btn.selected {
      ring-width: 2px;
      ring-color: #15803d;
      ring-offset-width: 2px;
    }
  </style>
</head>
<body class="text-gray-900 flex flex-col min-h-screen relative pb-[90px]">

  <!-- TOP HEADER -->
  <header class="bg-white/80 backdrop-blur-md text-gray-900 px-4 py-3 sticky top-0 z-50 shadow-sm flex items-center justify-between">
    <button onclick="window.history.back()" class="p-2 bg-gray-100 rounded-full btn-press">
      <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="font-bold text-lg text-center flex-1 mx-4 truncate" id="header-title">Details</h1>
    <button class="p-2 bg-gray-100 rounded-full btn-press" onclick="shareProduct()">
      <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
    </button>
  </header>

  <main class="flex-1 w-full max-w-md mx-auto relative">
    
    <!-- Loading State -->
    <div id="loading" class="flex flex-col items-center justify-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-green-200 border-t-green-700 mb-4"></div>
      <p class="text-gray-500 font-medium">Loading details...</p>
    </div>

    <div id="product-content" class="hidden">
      <!-- Media Gallery -->
      <div class="bg-white pt-4 pb-8 px-4 rounded-b-3xl shadow-sm relative">
        <div id="stock-badge-container" class="absolute top-4 right-4 z-10"></div>
        <div class="w-full h-72 flex items-center justify-center mb-4">
          <img id="main-image" src="" alt="Product Image" class="w-full h-full object-contain product-image drop-shadow-md">
        </div>
        
        <!-- Thumbnail Gallery (Optional, rendered if multiple images) -->
        <div id="thumbnail-gallery" class="flex justify-center gap-3 mt-4 hide-scroll overflow-x-auto">
          <!-- Thumbnails injected here -->
        </div>
      </div>

      <!-- Product Info -->
      <div class="px-5 pt-6 pb-4">
        <div class="flex justify-between items-start gap-4 mb-2">
          <h2 id="product-title" class="text-2xl font-black leading-tight text-gray-900"></h2>
        </div>
        
        <div class="flex items-center gap-2 mb-4">
          <div class="flex text-yellow-400">
            <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
            <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
            <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
            <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
            <svg class="w-4 h-4 fill-current text-gray-300" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
          </div>
          <span class="text-xs text-gray-500 font-medium ml-1">4.8 (124 reviews)</span>
        </div>
        
        <div class="flex items-baseline gap-2 mb-6">
          <span class="text-3xl font-black text-green-700" id="product-price"></span>
          <span class="text-sm font-medium text-gray-500 line-through" id="product-old-price"></span>
        </div>

        <!-- Tiered Bulk Pricing (Loop A) -->
        <div id="tiered-pricing-container" class="hidden mb-6 bg-green-50/50 border border-green-100 p-4 rounded-2xl">
          <h3 class="font-black text-green-900 text-xs uppercase tracking-wider mb-2.5 flex items-center gap-1.5">
            <svg class="w-4 h-4 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            Group Co-Buying Price Tiers
          </h3>
          <div class="space-y-2" id="price-tiers-list">
            <!-- Dynamic list of tiers -->
          </div>
          <!-- Progress to next tier indicator -->
          <div id="tier-progress-section" class="mt-4 pt-3 border-t border-green-100/50 hidden">
            <div class="flex justify-between items-center text-xs font-bold text-green-800 mb-1">
              <span id="tier-progress-label">Group Quantity: 0 units</span>
              <span id="tier-progress-target">Next tier: Qty 3 (Save K20)</span>
            </div>
            <div class="w-full bg-green-100/60 rounded-full h-2">
              <div id="tier-progress-bar" class="bg-orange-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="tier-progress-subtext" class="text-[10px] text-green-700/80 font-medium mt-1.5"></p>
          </div>
        </div>

        <!-- Dynamic Selectors container -->
        <div id="selectors-container" class="mb-6 space-y-5">
          <!-- Injected via JS based on category -->
        </div>

        <!-- Divider -->
        <div class="h-px w-full bg-gray-200 mb-6"></div>

        <!-- Description -->
        <div>
          <h3 class="font-bold text-lg mb-3">Product Details</h3>
          <p id="product-desc" class="text-gray-600 text-sm leading-relaxed mb-4"></p>
          
          <!-- Key features list -->
          <ul class="space-y-2" id="key-features">
            <li class="flex items-center text-sm text-gray-600">
              <svg class="w-5 h-5 text-green-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
              Verified Supplier
            </li>
            <li class="flex items-center text-sm text-gray-600">
              <svg class="w-5 h-5 text-green-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
              Fast Group Shipping Available
            </li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <!-- BOTTOM ACTION BAR -->
  <div class="fixed bottom-0 w-full max-w-md mx-auto left-0 right-0 bg-white border-t border-gray-100 z-50 px-4 py-3 pb-[calc(12px+env(safe-area-inset-bottom))] shadow-[0_-8px_20px_rgba(0,0,0,0.06)] rounded-t-3xl flex items-center justify-between gap-3">
    
    <!-- Quantity -->
    <div class="flex items-center bg-gray-100 rounded-xl px-2 py-1.5 border border-gray-200">
      <button onclick="updateQty(-1)" class="w-8 h-8 flex items-center justify-center text-gray-600 hover:bg-gray-200 rounded-lg btn-press">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4"></path></svg>
      </button>
      <span id="qty-display" class="w-8 text-center font-bold text-gray-900">1</span>
      <button onclick="updateQty(1)" class="w-8 h-8 flex items-center justify-center text-gray-600 hover:bg-gray-200 rounded-lg btn-press">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
      </button>
    </div>
    
    <!-- Add to Cart (Opens Modal) -->
    <button onclick="openCartChoiceModal()" class="flex-1 bg-green-700 hover:bg-green-800 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg btn-press transition-colors flex items-center justify-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
      Add to Cart
    </button>
  </div>

  <!-- CART CHOICE MODAL (Bottom Sheet) -->
  <div id="cart-choice-modal" class="fixed inset-0 z-[100] bg-black/60 hidden items-end justify-center backdrop-blur-sm transition-opacity" onclick="if(event.target===this) closeCartChoiceModal()">
    <div class="bg-white w-full max-w-md rounded-t-3xl shadow-2xl overflow-hidden transform translate-y-full transition-transform duration-300" id="cart-choice-content">
      <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mt-4 mb-2"></div>
      <div class="p-6 text-center">
        <h3 class="font-black text-xl text-gray-900 mb-1">How would you like to buy?</h3>
        <p class="text-sm text-gray-500 font-medium mb-6">Choose whether this is a personal order or a shared group order.</p>
        
        <div class="space-y-3">
          <button onclick="addToPersonalCart()" class="w-full bg-orange-50 text-orange-600 border-2 border-orange-200 py-4 rounded-xl font-black text-lg hover:bg-orange-100 transition-colors btn-press flex items-center justify-center gap-3">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            Buy For Myself
          </button>
          
          <button onclick="handleAddToCart()" class="w-full bg-green-700 hover:bg-green-800 text-white py-4 rounded-xl font-black text-lg shadow-md transition-colors btn-press flex items-center justify-center gap-3">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            Add to Chilimba Group
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    
    let currentProduct = null;
    let selectedQuantity = 1;
    let selectedVariant = {}; // e.g. { size: 'M', color: 'Red' }

    async function fetchProductDetails() {
      if (!productId) {
        alert("Product not found");
        window.location.href = '/';
        return;
      }
      
      try {
        // Fetching all for MVP frontend filtering as discussed
        const response = await fetch('/api/v1/products');
        const data = await response.json();
        
        currentProduct = data.products.find(p => p.id === productId);
        
        if (currentProduct) {
          renderDetails(currentProduct);
        } else {
          alert("Product not found");
          window.location.href = '/';
        }
      } catch (err) {
        console.error('Error fetching products:', err);
        alert("Error loading product");
      }
    }

    function renderDetails(p) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('product-content').classList.remove('hidden');
      
      document.getElementById('header-title').innerText = p.title;
      document.getElementById('product-title').innerText = p.title;
      document.getElementById('product-price').innerText = `K${parseFloat(p.price_zmw).toLocaleString()}`;
      
      // Fake old price for UI purposes (15% more)
      const oldPrice = parseFloat(p.price_zmw) * 1.15;
      document.getElementById('product-old-price').innerText = `K${oldPrice.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
      
      document.getElementById('product-desc').innerText = p.description || "No description provided.";
      
      // Main image
      let img = p.image_urls && p.image_urls.length > 0 ? p.image_urls[0] : '/assets/img/logo.png';
      document.getElementById('main-image').src = img;
      
      // Stock Badge
      if (p.is_local_stock) {
        document.getElementById('stock-badge-container').innerHTML = `
          <span class="bg-green-500 text-white text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider shadow-sm flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Local Stock
          </span>
        `;
      }
      
      // Thumbnails (if multiple, currently just mock if only 1 for demo)
      const thumbGallery = document.getElementById('thumbnail-gallery');
      const images = p.image_urls && p.image_urls.length > 1 ? p.image_urls : [img, img, img]; // Fake extra thumbs if needed
      
      if (images.length > 1) {
        let thumbHtml = '';
        images.forEach((src, idx) => {
          const border = idx === 0 ? 'border-green-600 border-2' : 'border-gray-200 border';
          thumbHtml += `
            <button onclick="setMainImage('${src}', this)" class="thumbnail-btn w-16 h-16 rounded-xl overflow-hidden bg-gray-50 flex-shrink-0 ${border} p-1 transition-all">
              <img src="${src}" class="w-full h-full object-contain product-image">
            </button>
          `;
        });
        thumbGallery.innerHTML = thumbHtml;
      }

      // Render Selectors based on Category
      renderSelectors(p.category || 'Fashion');
      
      // Render Tiered Pricing Tiers
      renderPriceTiers(p);
    }

    function setMainImage(src, btn) {
      document.getElementById('main-image').src = src;
      document.querySelectorAll('.thumbnail-btn').forEach(b => {
        b.classList.remove('border-green-600', 'border-2');
        b.classList.add('border-gray-200', 'border');
      });
      btn.classList.remove('border-gray-200', 'border');
      btn.classList.add('border-green-600', 'border-2');
    }

    function renderSelectors(category) {
      const container = document.getElementById('selectors-container');
      let html = '';
      const catLower = category.toLowerCase();
      
      // Determine what to show
      const showSizes = ['fashion', 'shoes', 'clothes'].includes(catLower);
      const showColors = ['fashion', 'shoes', 'clothes', 'phones & tablets', 'appliances', 'computing'].includes(catLower);
      
      if (showSizes) {
        const sizes = catLower === 'shoes' ? ['38', '39', '40', '41', '42', '43'] : ['S', 'M', 'L', 'XL', 'XXL'];
        selectedVariant.size = sizes[0]; // default
        
        html += `
          <div>
            <div class="flex justify-between items-center mb-2">
              <h4 class="font-bold text-sm text-gray-900">Select Size</h4>
              <span class="text-xs text-orange-500 font-semibold cursor-pointer">Size Guide</span>
            </div>
            <div class="flex flex-wrap gap-2">
              ${sizes.map((s, i) => `
                <button onclick="selectVariant('size', '${s}', this)" class="variant-btn size-btn px-4 py-2 rounded-lg border text-sm font-bold transition-colors ${i === 0 ? 'selected' : 'border-gray-200 text-gray-600 hover:border-gray-300'}">
                  ${s}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }
      
      if (showColors) {
        const colors = [
          { name: 'Black', hex: '#111827' },
          { name: 'White', hex: '#f9fafb' },
          { name: 'Blue', hex: '#3b82f6' },
          { name: 'Red', hex: '#ef4444' }
        ];
        selectedVariant.color = colors[0].name; // default
        
        html += `
          <div>
            <h4 class="font-bold text-sm text-gray-900 mb-2">Color: <span id="color-label" class="font-normal text-gray-600">${colors[0].name}</span></h4>
            <div class="flex flex-wrap gap-3">
              ${colors.map((c, i) => `
                <button onclick="selectVariant('color', '${c.name}', this, '.color-btn')" class="variant-btn color-btn w-10 h-10 rounded-full shadow-sm flex items-center justify-center transition-all ${i === 0 ? 'selected' : ''}" style="background-color: ${c.hex}; border: 1px solid #e5e7eb;">
                  ${i===0 && c.hex==='#f9fafb' ? `<svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>` : ''}
                  ${i===0 && c.hex!=='#f9fafb' ? `<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>` : ''}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }
      
      container.innerHTML = html;
    }

    function selectVariant(type, value, btn, selectorClass = '.size-btn') {
      selectedVariant[type] = value;
      
      if (type === 'color') {
        document.getElementById('color-label').innerText = value;
        // Logic to update color button checkmarks could go here
      }
      
      document.querySelectorAll(selectorClass).forEach(b => {
        b.classList.remove('selected', 'border-green-700', 'bg-green-700', 'text-white', 'ring-2');
        if (selectorClass === '.size-btn') {
          b.classList.add('border-gray-200', 'text-gray-600');
        }
      });
      
      btn.classList.add('selected');
      if (selectorClass === '.size-btn') {
        btn.classList.remove('border-gray-200', 'text-gray-600');
      }
    }

    function updateQty(change) {
      selectedQuantity += change;
      if (selectedQuantity < 1) selectedQuantity = 1;
      if (selectedQuantity > 20) {
        alert("Maximum 20 items per order limit for MVP.");
        selectedQuantity = 20;
      }
      document.getElementById('qty-display').innerText = selectedQuantity;
    }

    function openCartChoiceModal() {
      if (!currentProduct) return;
      document.getElementById('cart-choice-modal').classList.remove('hidden');
      document.getElementById('cart-choice-modal').classList.add('flex');
      setTimeout(() => document.getElementById('cart-choice-content').classList.remove('translate-y-full'), 10);
    }

    function closeCartChoiceModal() {
      document.getElementById('cart-choice-content').classList.add('translate-y-full');
      setTimeout(() => {
        document.getElementById('cart-choice-modal').classList.add('hidden');
        document.getElementById('cart-choice-modal').classList.remove('flex');
      }, 300);
    }

    function getTitleWithVariants() {
      let titleWithVariants = currentProduct.title;
      if (selectedVariant.size || selectedVariant.color) {
         const variants = [];
         if (selectedVariant.size) variants.push(`Size: ${selectedVariant.size}`);
         if (selectedVariant.color) variants.push(`Color: ${selectedVariant.color}`);
         titleWithVariants += ` (${variants.join(', ')})`;
      }
      return titleWithVariants;
    }

    async function addToPersonalCart() {
      closeCartChoiceModal();
      
      try {
        const authRes = await fetch('/api/v1/auth/me');
        const authData = await authRes.json();
        if (!authData.authenticated) {
          window.location.href = '/signup.html';
          return;
        }
        
        const titleWithVariants = getTitleWithVariants();
        const personalGroupId = 'PERSONAL_' + authData.user.user_id;
        
        const res = await fetch('/api/v1/cart/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            group_id: personalGroupId,
            user_id: authData.user.user_id,
            product_id: currentProduct.id,
            title: titleWithVariants,
            price_zmw: parseFloat(currentProduct.price_zmw),
            quantity: selectedQuantity,
            image_url: currentProduct.image_urls ? currentProduct.image_urls[0] : ''
          })
        });
        
        if (res.ok) {
          localStorage.setItem('activeGroupId', personalGroupId);
          alert('Added to your Personal Cart!');
          window.location.href = '/group-cart.html';
        } else {
          alert('Failed to add to cart.');
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function handleAddToCart() {
      closeCartChoiceModal();
      
      const groupId = localStorage.getItem('activeGroupId');
      if (!groupId || groupId.startsWith('PERSONAL_')) {
        alert("Please select a Chilimba group from your Dashboard first!");
        window.location.href = '/dashboard.html';
        return;
      }
      
      try {
        const authRes = await fetch('/api/v1/auth/me');
        const authData = await authRes.json();
        if (!authData.authenticated) {
          window.location.href = '/signup.html';
          return;
        }
        
        const titleWithVariants = getTitleWithVariants();
        
        const res = await fetch('/api/v1/cart/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            group_id: groupId,
            user_id: authData.user.user_id,
            product_id: currentProduct.id,
            title: titleWithVariants,
            price_zmw: parseFloat(currentProduct.price_zmw),
            quantity: selectedQuantity,
            image_url: currentProduct.image_urls ? currentProduct.image_urls[0] : ''
          })
        });
        
        if (res.ok) {
          window.dispatchEvent(new Event('cart-updated'));
          alert('Added to your shared Chilimba cart!');
          window.location.href = '/group-cart.html';
        } else {
          alert('Failed to add to cart.');
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function shareProduct() {
      if (!currentProduct) return;
      const url = window.location.href;
      const title = currentProduct.title;
      const text = `Check out ${title} on Chilimba for K${parseFloat(currentProduct.price_zmw).toLocaleString()}!`;
      
      if (navigator.share) {
        try {
          await navigator.share({ title, text, url });
        } catch(err) {
          console.error("Error sharing", err);
        }
      } else {
        const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(text + " " + url)}`;
        window.open(whatsappUrl, '_blank');
      }
    }

    function renderPriceTiers(p) {
      const tiers = p.price_tiers;
      if (!tiers || tiers.length <= 1) return;
      
      const container = document.getElementById('tiered-pricing-container');
      container.classList.remove('hidden');
      
      const list = document.getElementById('price-tiers-list');
      list.innerHTML = '';
      
      const sortedTiers = [...tiers].sort((a, b) => a.min_qty - b.min_qty);
      
      sortedTiers.forEach((tier, index) => {
        const discountText = index === 0 ? 'Retail Price' : `Save ${Math.round((1 - (tier.price_zmw / p.price_zmw)) * 100)}%`;
        const qtyLabel = index === sortedTiers.length - 1 ? `${tier.min_qty}+ units` : `${tier.min_qty} - ${sortedTiers[index + 1].min_qty - 1} units`;
        
        list.innerHTML += `
          <div class="flex justify-between items-center text-xs font-semibold py-1 border-b border-green-100/30 last:border-0">
            <span class="text-green-800">${qtyLabel}</span>
            <div class="flex items-center gap-2">
              <span class="text-green-950 font-black">K${parseFloat(tier.price_zmw).toLocaleString()}</span>
              <span class="text-[9px] bg-green-100 text-green-700 font-bold px-1.5 py-0.5 rounded-full uppercase">${discountText}</span>
            </div>
          </div>
        `;
      });

      checkGroupCartProgress(p);
    }

    async function checkGroupCartProgress(product) {
      const activeGroupId = localStorage.getItem('activeGroupId');
      if (!activeGroupId || activeGroupId.startsWith('PERSONAL_')) {
        return;
      }
      
      try {
        const authRes = await fetch('/api/v1/auth/me');
        const authData = await authRes.json();
        if (!authData.authenticated) return;
        
        const res = await fetch(`${API_BASE}/api/v1/cart/${activeGroupId}?user_id=${authData.user.user_id}`);
        if (res.ok) {
          const data = await res.json();
          const items = data.items || [];
          
          let groupQty = 0;
          items.forEach(item => {
            if (item.product_id === product.id) {
              groupQty += item.quantity;
            }
          });
          
          renderTierProgress(product, groupQty);
        }
      } catch (err) {
        console.error('Error checking group cart progress:', err);
      }
    }

    function renderTierProgress(product, groupQty) {
      const tiers = product.price_tiers;
      if (!tiers || tiers.length <= 1) return;
      
      const progressSection = document.getElementById('tier-progress-section');
      progressSection.classList.remove('hidden');
      
      document.getElementById('tier-progress-label').innerText = `Group Quantity: ${groupQty} unit(s) in cart`;
      
      let activeTier = tiers[0];
      let nextTier = null;
      
      const sortedTiers = [...tiers].sort((a, b) => a.min_qty - b.min_qty);
      
      sortedTiers.forEach(tier => {
        if (groupQty >= tier.min_qty) {
          activeTier = tier;
        } else if (!nextTier) {
          nextTier = tier;
        }
      });
      
      const bar = document.getElementById('tier-progress-bar');
      const subtext = document.getElementById('tier-progress-subtext');
      const targetLabel = document.getElementById('tier-progress-target');
      
      if (nextTier) {
        const progressPercent = Math.min(100, (groupQty / nextTier.min_qty) * 100);
        bar.style.width = `${progressPercent}%`;
        
        const unitsNeeded = nextTier.min_qty - groupQty;
        targetLabel.innerText = `Next tier: Qty ${nextTier.min_qty} (Save K${(activeTier.price_zmw - nextTier.price_zmw)})`;
        subtext.innerText = `Add ${unitsNeeded} more unit(s) in your group cart to unlock the K${nextTier.price_zmw} bulk price!`;
      } else {
        bar.style.width = '100%';
        bar.classList.remove('bg-orange-500');
        bar.classList.add('bg-green-600');
        targetLabel.innerText = `🎉 Max Discount Unlocked!`;
        subtext.innerText = `Your group has unlocked the lowest bulk price of K${activeTier.price_zmw}!`;
      }
    }

    // Init
    fetchProductDetails();
  </script>
</body>
