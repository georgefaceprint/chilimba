<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Complete Profile - Chilimba</title>
  <meta name="theme-color" content="#15803d">
  <link href="/assets/css/tailwind.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .btn-press:active { transform: scale(0.95); transition: transform 0.1s; }
    .pin-dot {
      width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid #d1d5db; background: transparent;
      transition: all 0.15s ease;
    }
    .pin-dot.filled { background: #15803d; border-color: #15803d; transform: scale(1.15); }
    .pin-dot.error  { background: #ef4444; border-color: #ef4444; }
    .num-key {
      width: 64px; height: 64px; border-radius: 50%;
      background: white; border: 1.5px solid #e5e7eb;
      font-size: 20px; font-weight: 800; color: #111827;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.12s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .num-key:active { background: #f0fdf4; border-color: #15803d; transform: scale(0.9); }
    .num-key.delete-key { font-size: 16px; color: #6b7280; }
    .num-key.empty-key  { background: transparent; border: none; box-shadow: none; pointer-events: none; }
  </style>
</head>
<body class="text-gray-900 min-h-screen flex flex-col">

  <main class="flex-1 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-6 relative overflow-hidden">
      <!-- Decorative circle -->
      <div class="absolute -top-16 -right-16 w-32 h-32 bg-green-500/10 rounded-full blur-2xl"></div>
      
      <div class="text-center mb-6 relative z-10">
        <div class="w-16 h-16 bg-green-100 text-green-700 rounded-full flex items-center justify-center mx-auto mb-3">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
        <h1 class="font-black text-2xl text-gray-900">Complete Profile</h1>
        <p class="text-sm text-gray-500 font-medium mt-1">Please provide your details for delivery.</p>
      </div>

      <form id="kyc-form" class="space-y-4 relative z-10" onsubmit="submitKyc(event)">
        
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="block text-xs font-bold uppercase tracking-wide text-gray-700 mb-1">First Name</label>
            <input type="text" id="kyc-name" required class="w-full bg-gray-50 border-2 border-gray-200 p-3 rounded-xl font-bold focus:border-green-500 focus:bg-white outline-none">
          </div>
          <div class="flex-1">
            <label class="block text-xs font-bold uppercase tracking-wide text-gray-700 mb-1">Surname</label>
            <input type="text" id="kyc-surname" required class="w-full bg-gray-50 border-2 border-gray-200 p-3 rounded-xl font-bold focus:border-green-500 focus:bg-white outline-none">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wide text-gray-700 mb-1">WhatsApp Number</label>
          <input type="tel" id="kyc-whatsapp" required placeholder="+260..." class="w-full bg-gray-50 border-2 border-gray-200 p-3 rounded-xl font-bold focus:border-green-500 focus:bg-white outline-none">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wide text-gray-700 mb-1">Province</label>
          <select id="kyc-province" required onchange="updateTowns()" class="w-full bg-gray-50 border-2 border-gray-200 p-3 rounded-xl font-bold focus:border-green-500 focus:bg-white outline-none appearance-none">
            <option value="">Select Province</option>
            <option value="Lusaka">Lusaka</option>
            <option value="Copperbelt">Copperbelt</option>
            <option value="Central">Central</option>
            <option value="Southern">Southern</option>
            <option value="Northern">Northern</option>
            <option value="Muchinga">Muchinga</option>
            <option value="Luapula">Luapula</option>
            <option value="North-Western">North-Western</option>
            <option value="Eastern">Eastern</option>
            <option value="Western">Western</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wide text-gray-700 mb-1">Town / Suburb</label>
          <select id="kyc-town" required class="w-full bg-gray-50 border-2 border-gray-200 p-3 rounded-xl font-bold focus:border-green-500 focus:bg-white outline-none appearance-none disabled:opacity-50" disabled>
            <option value="">Select Town</option>
          </select>
        </div>

        <div class="pt-2">
          <button type="submit" id="btn-submit" class="w-full bg-green-700 text-white py-3.5 rounded-xl font-black text-lg shadow-md hover:bg-green-800 transition-colors btn-press">Save Profile</button>
          
          <button type="button" onclick="skipKyc()" class="w-full mt-3 text-gray-500 font-bold py-2 text-sm hover:text-gray-800 btn-press">Skip for now</button>
        </div>
      </form>
    </div>

    <!-- ── PASSCODE SETUP CARD ────────────────────── -->
    <div class="w-full max-w-sm mt-5 bg-white rounded-3xl shadow-xl p-6 relative overflow-hidden">
      <div class="absolute -bottom-12 -left-12 w-28 h-28 bg-orange-500/10 rounded-full blur-2xl"></div>
      <div class="relative z-10">
        <div class="flex items-center gap-3 mb-1">
          <div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <div>
            <h2 class="font-black text-gray-900 text-base">Set Quick Passcode</h2>
            <p class="text-xs text-gray-500 font-medium">6-digit PIN for fast login</p>
          </div>
        </div>

        <!-- Step 1: Enter PIN -->
        <div id="pc-setup-step1" class="mt-5">
          <p class="text-xs font-bold text-gray-600 uppercase tracking-wider mb-3 text-center">Enter new 6-digit passcode</p>
          <div class="flex justify-center gap-2.5 mb-5" id="pc-dots-1">
            <div class="pin-dot" id="pc1-dot-0"></div>
            <div class="pin-dot" id="pc1-dot-1"></div>
            <div class="pin-dot" id="pc1-dot-2"></div>
            <div class="pin-dot" id="pc1-dot-3"></div>
            <div class="pin-dot" id="pc1-dot-4"></div>
          </div>
          <div class="grid grid-cols-3 gap-2.5 place-items-center">
            <button class="num-key btn-press" onclick="pc1Input('1')">1</button>
            <button class="num-key btn-press" onclick="pc1Input('2')">2</button>
            <button class="num-key btn-press" onclick="pc1Input('3')">3</button>
            <button class="num-key btn-press" onclick="pc1Input('4')">4</button>
            <button class="num-key btn-press" onclick="pc1Input('5')">5</button>
            <button class="num-key btn-press" onclick="pc1Input('6')">6</button>
            <button class="num-key btn-press" onclick="pc1Input('7')">7</button>
            <button class="num-key btn-press" onclick="pc1Input('8')">8</button>
            <button class="num-key btn-press" onclick="pc1Input('9')">9</button>
            <button class="num-key empty-key"></button>
            <button class="num-key btn-press" onclick="pc1Input('0')">0</button>
            <button class="num-key delete-key btn-press" onclick="pc1Delete()">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"/></svg>
            </button>
          </div>
        </div>

        <!-- Step 2: Re-enter PIN -->
        <div id="pc-setup-step2" class="mt-5 hidden">
          <p class="text-xs font-bold text-gray-600 uppercase tracking-wider mb-3 text-center">Re-enter to confirm</p>
          <div class="flex justify-center gap-2.5 mb-5" id="pc-dots-2">
            <div class="pin-dot" id="pc2-dot-0"></div>
            <div class="pin-dot" id="pc2-dot-1"></div>
            <div class="pin-dot" id="pc2-dot-2"></div>
            <div class="pin-dot" id="pc2-dot-3"></div>
            <div class="pin-dot" id="pc2-dot-4"></div>
          </div>
          <div class="grid grid-cols-3 gap-2.5 place-items-center">
            <button class="num-key btn-press" onclick="pc2Input('1')">1</button>
            <button class="num-key btn-press" onclick="pc2Input('2')">2</button>
            <button class="num-key btn-press" onclick="pc2Input('3')">3</button>
            <button class="num-key btn-press" onclick="pc2Input('4')">4</button>
            <button class="num-key btn-press" onclick="pc2Input('5')">5</button>
            <button class="num-key btn-press" onclick="pc2Input('6')">6</button>
            <button class="num-key btn-press" onclick="pc2Input('7')">7</button>
            <button class="num-key btn-press" onclick="pc2Input('8')">8</button>
            <button class="num-key btn-press" onclick="pc2Input('9')">9</button>
            <button class="num-key empty-key"></button>
            <button class="num-key btn-press" onclick="pc2Input('0')">0</button>
            <button class="num-key delete-key btn-press" onclick="pc2Delete()">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"/></svg>
            </button>
          </div>
          <p id="pc-mismatch" class="text-red-500 text-xs font-bold text-center mt-3 hidden">❌ Passcodes don't match. Try again.</p>
          <button onclick="resetPasscodeSetup()" class="mt-4 w-full text-xs font-bold text-gray-400 hover:text-gray-700 btn-press">← Start over</button>
        </div>

        <!-- Step 3: Saved -->
        <div id="pc-setup-step3" class="mt-5 hidden text-center">
          <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3">
            <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          </div>
          <p class="font-black text-gray-900 text-base">Passcode Saved!</p>
          <p class="text-xs text-gray-500 mt-1">You can now log in instantly using your phone number + passcode.</p>
          <button onclick="resetPasscodeSetup()" class="mt-4 text-xs font-bold text-orange-500 hover:text-orange-700 btn-press">Change Passcode</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const zambiaLocations = {
      "Lusaka": ["Lusaka City", "Chongwe", "Kafue", "Chilanga", "Luangwa"],
      "Copperbelt": ["Ndola", "Kitwe", "Chingola", "Mufulira", "Luanshya", "Kalulushi", "Chililabombwe"],
      "Southern": ["Livingstone", "Choma", "Mazabuka", "Monze", "Kalomo"],
      "Central": ["Kabwe", "Kapiri Mposhi", "Serenje", "Mkushi"],
      "Northern": ["Kasama", "Mbala", "Mpika", "Luwingu"],
      "Muchinga": ["Chinsali", "Isoka", "Nakonde"],
      "Luapula": ["Mansa", "Nchelenge", "Kawambwa"],
      "North-Western": ["Solwezi", "Mwinilunga", "Zambezi"],
      "Eastern": ["Chipata", "Petauke", "Katete", "Lundazi"],
      "Western": ["Mongu", "Kaoma", "Senanga"]
    };

    function updateTowns() {
      const provSelect = document.getElementById('kyc-province');
      const townSelect = document.getElementById('kyc-town');
      const selected = provSelect.value;
      
      townSelect.innerHTML = '<option value="">Select Town</option>';
      
      if (selected && zambiaLocations[selected]) {
        zambiaLocations[selected].forEach(t => {
          townSelect.innerHTML += `<option value="${t}">${t}</option>`;
        });
        townSelect.disabled = false;
      } else {
        townSelect.disabled = true;
      }
    }

    async function loadPrexistingData() {
      try {
        const res = await fetch('/api/v1/auth/me');
        const data = await res.json();
        if (data.authenticated && data.user) {
           const u = data.user;
           if (u.first_name) document.getElementById('kyc-name').value = u.first_name;
           if (u.last_name) document.getElementById('kyc-surname').value = u.last_name;
           if (!u.first_name && u.display_name) {
             const parts = u.display_name.split(' ');
             document.getElementById('kyc-name').value = parts[0] || '';
             document.getElementById('kyc-surname').value = parts.slice(1).join(' ') || '';
           }
           if (u.phone_number) {
             document.getElementById('kyc-whatsapp').value = u.phone_number;
           }
           if (u.province) {
             document.getElementById('kyc-province').value = u.province;
             updateTowns();
           }
           if (u.town) {
             document.getElementById('kyc-town').value = u.town;
           }
        }
      } catch(e) {}
    }

    function formatPhoneNumber(phone) {
      let cleaned = phone.replace(/[^\d+]/g, '');
      if (cleaned.startsWith('0') && cleaned.length === 10) {
        cleaned = '+260' + cleaned.substring(1);
      }
      if (!cleaned.startsWith('+') && cleaned.length >= 11) {
        cleaned = '+' + cleaned;
      }
      return cleaned;
    }

    async function submitKyc(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      btn.innerText = 'Saving...';
      btn.disabled = true;

      const payload = {
        name: document.getElementById('kyc-name').value.trim(),
        surname: document.getElementById('kyc-surname').value.trim(),
        whatsapp: formatPhoneNumber(document.getElementById('kyc-whatsapp').value.trim()),
        province: document.getElementById('kyc-province').value,
        town: document.getElementById('kyc-town').value
      };

      try {
        const res = await fetch('/api/v1/user/update-kyc', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
           // Clear skip flag just in case
           sessionStorage.removeItem('skipped_kyc');
           
           // Redirect back to where they came from or dashboard
           const params = new URLSearchParams(window.location.search);
           const returnTo = params.get('returnTo') || '/dashboard.html';
           window.location.href = returnTo;
        } else {
          alert('Failed to save profile details.');
        }
      } catch (err) {
        alert('Error saving details.');
      } finally {
        btn.innerText = 'Save Profile';
        btn.disabled = false;
      }
    }

    function skipKyc() {
      sessionStorage.setItem('skipped_kyc', 'true');
      const params = new URLSearchParams(window.location.search);
      const returnTo = params.get('returnTo') || '/dashboard.html';
      window.location.href = returnTo;
    }

    loadPrexistingData();

    // ── PASSCODE SETUP ────────────────────────────────────
    let pc1 = ''; // first entry
    let pc2 = ''; // confirm entry

    function pc1Input(d) {
      if (pc1.length >= 5) return;
      pc1 += d;
      updateDots('pc1', pc1);
      if (pc1.length === 5) {
        // Move to confirm step
        setTimeout(() => {
          document.getElementById('pc-setup-step1').classList.add('hidden');
          document.getElementById('pc-setup-step2').classList.remove('hidden');
        }, 200);
      }
    }
    function pc1Delete() {
      pc1 = pc1.slice(0, -1);
      updateDots('pc1', pc1);
    }

    function pc2Input(d) {
      if (pc2.length >= 5) return;
      pc2 += d;
      updateDots('pc2', pc2);
      if (pc2.length === 5) {
        // Validate match
        if (pc2 === pc1) {
          savePasscode(pc1);
        } else {
          // Show mismatch — flash red then reset confirm
          for (let i = 0; i < 5; i++) {
            const dot = document.getElementById(`pc2-dot-${i}`);
            dot.classList.add('error');
          }
          document.getElementById('pc-mismatch').classList.remove('hidden');
          setTimeout(() => {
            pc2 = '';
            updateDots('pc2', pc2);
            document.getElementById('pc-mismatch').classList.add('hidden');
          }, 1200);
        }
      }
    }
    function pc2Delete() {
      pc2 = pc2.slice(0, -1);
      updateDots('pc2', pc2);
      document.getElementById('pc-mismatch').classList.add('hidden');
    }

    function updateDots(prefix, val) {
      for (let i = 0; i < 5; i++) {
        const dot = document.getElementById(`${prefix}-dot-${i}`);
        dot.classList.remove('error');
        if (i < val.length) dot.classList.add('filled');
        else dot.classList.remove('filled');
      }
    }

    function resetPasscodeSetup() {
      pc1 = ''; pc2 = '';
      updateDots('pc1', ''); updateDots('pc2', '');
      document.getElementById('pc-mismatch').classList.add('hidden');
      document.getElementById('pc-setup-step1').classList.remove('hidden');
      document.getElementById('pc-setup-step2').classList.add('hidden');
      document.getElementById('pc-setup-step3').classList.add('hidden');
    }

    async function savePasscode(code) {
      try {
        const res = await fetch('/api/v1/auth/set-passcode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passcode: code })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          document.getElementById('pc-setup-step2').classList.add('hidden');
          document.getElementById('pc-setup-step3').classList.remove('hidden');
          pc1 = ''; pc2 = '';
        } else {
          alert('Could not save passcode: ' + (data.error || 'Unknown error'));
          resetPasscodeSetup();
        }
      } catch (err) {
        alert('Network error saving passcode.');
        resetPasscodeSetup();
      }
    }
  </script>
</body>
</html>
