<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chilimba Courier Portal</title>
  <meta name="theme-color" content="#15803d">
  <link rel="manifest" href="/manifest.json">
  <link href="/assets/css/tailwind.css" rel="stylesheet">
  <!-- HTML5 QR Code Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .btn-press:active { transform: scale(0.95); transition: transform 0.1s; }
  </style>
</head>
<body class="text-gray-900 pb-20 min-h-[100dvh] flex flex-col relative">

  <!-- Header -->
  <header class="bg-gray-900 text-white px-4 py-4 shadow-md flex justify-between items-center sticky top-0 z-50 rounded-b-2xl border-b-4 border-green-700">
    <div>
      <h1 class="text-lg font-black tracking-tight flex items-center gap-2">
        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
        Logistics Scanner
      </h1>
      <p class="text-xs font-bold text-gray-400 mt-0.5">Courier ID: RUN-8821</p>
    </div>
    <span class="bg-green-700 text-white text-[10px] font-black uppercase tracking-wider px-3 py-1.5 rounded-full shadow-inner border border-green-600">On Duty</span>
  </header>

  <!-- Main Content -->
  <main class="flex-grow p-4 flex flex-col space-y-6 max-w-md mx-auto w-full pt-6">
    
    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 text-center">
      <h2 class="font-black text-gray-900 text-xl mb-1">Scan Package Label</h2>
      <p class="text-xs text-gray-500 font-medium mb-5">Scan QR Code or Barcode at the border post, origin center, or destination.</p>
      
      <!-- QR Scanner UI -->
      <div id="reader" class="w-full bg-black rounded-2xl overflow-hidden mb-5 border-4 border-gray-100 aspect-square mx-auto shadow-inner"></div>
      
      <div class="flex space-x-2">
        <input type="text" id="manual-ref" class="flex-grow border-2 border-gray-200 bg-gray-50 p-4 rounded-xl text-center font-mono font-bold uppercase tracking-widest focus:border-green-600 focus:bg-white focus:outline-none" placeholder="CHIL-XXXXX">
        <button onclick="lookupPackage(document.getElementById('manual-ref').value)" class="bg-gray-900 text-white px-5 font-black rounded-xl shadow-md hover:bg-black transition-colors btn-press">FIND</button>
      </div>
    </div>

    <!-- Package Detail Modal/Card (Hidden initially) -->
    <div id="package-card" class="hidden bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 p-6 overflow-hidden transform transition-all duration-300 translate-y-4 opacity-0">
      
      <div class="flex justify-between items-start mb-5 border-b border-gray-100 pb-5">
        <div>
          <span class="text-[10px] font-black uppercase tracking-widest text-green-700 bg-green-50 px-2 py-1 rounded" id="pkg-ref">CHIL-98217</span>
          <h4 class="font-black text-gray-900 text-lg mt-2 leading-tight" id="pkg-title">30-Piece Ceramic Set</h4>
          <p class="text-xs font-bold text-gray-500 mt-1">Destination: Ndola Warehouse</p>
        </div>
      </div>
      
      <div class="mb-5 space-y-4">
        <div>
          <label class="block text-xs font-black text-gray-900 uppercase mb-2">1. Current Location</label>
          <select id="transit-location" class="w-full border-2 border-gray-200 p-3.5 rounded-xl font-bold text-gray-800 focus:border-green-600 focus:outline-none bg-gray-50 focus:bg-white">
            <optgroup label="Origin Hubs">
              <option value="Dar es Salaam">Dar es Salaam</option>
              <option value="Tunduma/Nakonde">Tunduma/Nakonde Border</option>
              <option value="Lusaka">Lusaka Origin</option>
            </optgroup>
            <optgroup label="Collection Points">
              <option value="Kitwe">Kitwe</option>
              <option value="Ndola">Ndola</option>
              <option value="Lusaka">Lusaka</option>
              <option value="Chingola">Chingola</option>
              <option value="Chililabombwe">Chililabombwe</option>
              <option value="Kasumbalesa">Kasumbalesa</option>
            </optgroup>
          </select>
        </div>
        
        <div>
          <label class="block text-xs font-black text-gray-900 uppercase mb-2">2. Set Status</label>
          <select id="transit-status" class="w-full border-2 border-gray-200 p-3.5 rounded-xl font-bold text-gray-800 focus:border-green-600 focus:outline-none bg-gray-50 focus:bg-white">
            <option value="RECEIVED_AT_WAREHOUSE">📦 Received at Hub / Warehouse</option>
            <option value="IN_TRANSIT">🚚 In Transit (Moving)</option>
            <option value="READY_FOR_PICKUP">✅ Ready for Pickup (At Destination)</option>
            <option value="COLLECTED">🤝 Collected by Buyer</option>
          </select>
        </div>
      </div>

      <button id="btn-transit" onclick="markUpdate()" class="w-full bg-green-700 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-green-800 transition-colors flex justify-center items-center gap-2 btn-press">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
        Save Tracking Update
      </button>
      <button onclick="cancelUpdate()" class="w-full mt-3 bg-white text-gray-500 py-3 rounded-xl font-bold text-sm hover:bg-gray-50 transition-colors btn-press">Cancel</button>
    </div>

  </main>

  <!-- Bottom Navigation Bar -->
  <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center pb-[env(safe-area-inset-bottom)] z-50 shadow-[0_-8px_20px_rgba(0,0,0,0.04)] rounded-t-2xl">
    <div class="max-w-md mx-auto flex justify-around items-center w-full h-[65px] px-2">
      <a href="/" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-700 transition-colors btn-press w-16">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="text-[10px] font-bold">Browse</span>
      </a>
      <a href="/vendor-dashboard.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-700 transition-colors btn-press w-16">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        <span class="text-[10px] font-bold">Vendor</span>
      </a>
      <a href="/runner-portal.html" class="flex flex-col items-center gap-1 text-green-700 w-16 relative">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
        <span class="text-[10px] font-black">Courier</span>
        <div class="absolute -bottom-1 w-1 h-1 bg-orange-500 rounded-full"></div>
      </a>
    </div>
  </nav>

  <script>
    let activeRef = null;

    // QR Init
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, (decodedText) => {
      lookupPackage(decodedText);
      html5QrCode.pause();
      setTimeout(() => html5QrCode.resume(), 4000);
    }).catch(err => {
      document.getElementById('reader').innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-500 bg-gray-50 p-6 text-sm font-bold"><svg class="w-10 h-10 mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>Camera Unavailable. Use Manual Entry.</div>';
    });

    function lookupPackage(ref) {
      if(!ref) return;
      activeRef = ref;
      document.getElementById('pkg-ref').innerText = ref.toUpperCase();
      
      // Mock lookup
      if(ref.includes('ORD-8992')) {
        document.getElementById('pkg-title').innerText = "Tanzanian Coffee Beans (Qty 5)";
      } else {
        document.getElementById('pkg-title').innerText = "Personal Assorted Goods";
      }

      const card = document.getElementById('package-card');
      card.classList.remove('hidden');
      setTimeout(() => card.classList.remove('translate-y-4', 'opacity-0'), 10);
      document.getElementById('manual-ref').value = '';
    }

    function cancelUpdate() {
      const card = document.getElementById('package-card');
      card.classList.add('translate-y-4', 'opacity-0');
      setTimeout(() => card.classList.add('hidden'), 300);
      activeRef = null;
    }

    function markUpdate() {
      const btn = document.getElementById('btn-transit');
      const loc = document.getElementById('transit-location').value;
      const status = document.getElementById('transit-status').value;
      
      btn.innerHTML = '<div class="animate-spin h-5 w-5 border-2 border-white rounded-full mr-2 border-t-transparent"></div> Saving...';
      btn.disabled = true;

      // Mock API call to /tracking/scan
      setTimeout(() => {
        btn.innerHTML = '✅ Update Saved Successfully';
        btn.classList.remove('bg-green-700');
        btn.classList.add('bg-gray-900');
        
        // Try to play success sound
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/ui/beep_short_on.ogg');
          audio.play().catch(e => {});
        } catch(e) {}

        setTimeout(() => {
           const card = document.getElementById('package-card');
           card.classList.add('translate-y-4', 'opacity-0');
           setTimeout(() => {
             card.classList.add('hidden');
             btn.innerHTML = '<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg> Save Tracking Update';
             btn.classList.remove('bg-gray-900');
             btn.classList.add('bg-green-700');
             btn.disabled = false;
           }, 300);
        }, 2000);
      }, 1000);
    }
  </script>
</body>
</html>
