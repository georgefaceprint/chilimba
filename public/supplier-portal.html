<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier Portal - Chilimba</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 pb-20">
  <!-- Header -->
  <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
    <div>
      <h1 class="text-xl font-bold">Supplier Portal</h1>
      <p class="text-xs text-blue-200">Dar Bulk Traders Ltd</p>
    </div>
    <span class="bg-green-500 text-xs font-bold px-2 py-1 rounded">Verified Seller</span>
  </header>

  <!-- Summary Widget -->
  <section class="p-4">
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
        <p class="text-xs text-gray-500 uppercase font-semibold">New Orders</p>
        <p class="text-3xl font-black text-blue-900">3</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
        <p class="text-xs text-gray-500 uppercase font-semibold">Dispatched</p>
        <p class="text-3xl font-black text-green-600">42</p>
      </div>
    </div>

    <!-- Active Orders List -->
    <h3 class="font-bold text-gray-700 mb-3">Pending Fulfillment (Payment Cleared)</h3>
    <div class="space-y-4" id="orders-list">
      
      <!-- Order Card 1 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 relative" id="order-1">
        <div class="flex justify-between items-start mb-2">
          <div>
            <span class="text-xs font-mono font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded">CHIL-98217</span>
            <h4 class="font-bold text-gray-900 mt-2">30-Piece Ceramic Dinnerware Set</h4>
          </div>
          <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded whitespace-nowrap">Payment Rx</span>
        </div>
        <p class="text-sm text-gray-600 mb-4">Destination: <b>Kasumbalesa Depot</b></p>
        
        <button onclick="markDispatched('order-1', 'CHIL-98217')" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 active:scale-95 transition-all flex justify-center items-center">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
          Mark as Packed & Dispatched
        </button>
      </div>

    </div>
  </section>

  <!-- Success Notification -->
  <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-full shadow-xl font-bold flex items-center space-x-2 transition-all duration-300 -translate-y-20 opacity-0 z-50">
    <span>Item Dispatched!</span>
  </div>

  <script>
    function markDispatched(cardId, orderRef) {
      const btn = document.querySelector(`#${cardId} button`);
      btn.innerHTML = '<div class="animate-spin h-5 w-5 border-2 border-white rounded-full mr-2 border-t-transparent"></div> Processing...';
      btn.disabled = true;

      // Mock API call to /tracking/dispatch
      setTimeout(() => {
        // Show success
        const card = document.getElementById(cardId);
        card.style.opacity = '0';
        setTimeout(() => card.remove(), 300);

        const toast = document.getElementById('toast');
        toast.classList.remove('-translate-y-20', 'opacity-0');
        
        // Play sound
        const audio = new Audio('/assets/sounds/payment-success.mp3');
        audio.play().catch(e => console.log('Audio blocked'));

        setTimeout(() => {
          toast.classList.add('-translate-y-20', 'opacity-0');
        }, 3000);

      }, 1000);
    }
  </script>
</body>
</html>
