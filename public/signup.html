<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up - Chilimba</title>
  <meta name="theme-color" content="#15803d">
  <link rel="icon" href="/assets/img/logo.png">
  <link rel="apple-touch-icon" href="/assets/img/logo.png">
  <link href="/assets/css/tailwind.css" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    .btn-press:active { transform: scale(0.97); transition: transform 0.1s; }
  </style>
</head>
<body class="flex flex-col min-h-screen relative overflow-hidden text-gray-900">

  <div class="flex-1 flex flex-col justify-center items-center px-6 pb-20 relative z-10 w-full max-w-md mx-auto">
    
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-28 h-28 bg-white rounded-[2.5rem] shadow-sm flex items-center justify-center p-2 border border-gray-100">
        <img src="/assets/img/logo.png" alt="Chilimba Logo" class="w-full h-full object-contain" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%2315803d\' stroke-width=\'2\'%3E%3Cpath stroke-linecap=\'round\' stroke-linejoin=\'round\' d=\'M13 10V3L4 14h7v7l9-11h-7z\'/%3E%3C/svg%3E';">
      </div>
    </div>

    <!-- Header -->
    <div class="text-center mb-10 w-full" id="auth-header">
      <h1 class="text-3xl font-black tracking-tight mb-2">Welcome to Chilimba</h1>
      <p class="text-gray-500 font-medium text-sm">Login or create an account to continue.</p>
    </div>

    <!-- MAIN OPTIONS -->
    <div id="auth-options" class="w-full space-y-4 transition-all duration-300">
      
      <!-- Sign Up / Sign In Text -->
      <div class="mb-4 text-center">
        <p class="text-sm font-medium text-gray-500">Sign Up (New Users) or Sign In (Returning Users)</p>
      </div>
      <!-- Google Auth Wrapper -->
      <div class="w-full h-[54px] relative flex justify-center items-center overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm hover:bg-gray-50 transition-colors btn-press">
        <div id="g_id_onload"
          data-client_id="714011063581-ki9st10fiap43pjgpu44ur41qg2ahnjr.apps.googleusercontent.com"
          data-callback="handleCredentialResponse"
          data-auto_prompt="false">
        </div>
        <div class="g_id_signin w-full flex justify-center" data-type="standard" data-size="large" data-width="320" data-theme="outline"
          data-text="continue_with" data-shape="rectangular" data-logo_alignment="center"></div>
      </div>

      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-200"></div>
        <span class="px-3 text-xs font-bold text-gray-400 uppercase tracking-wider">Or Use Passcode</span>
        <div class="flex-1 border-t border-gray-200"></div>
      </div>

      <!-- Agent Passcode -->
      <button onclick="showStep('pc-step-1')" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold text-[15px] shadow-sm hover:bg-black transition-colors flex items-center justify-center gap-3 btn-press">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Use Passcode
      </button>

    </div>



    <!-- PASSCODE FLOW (AGENT) -->
    <div id="pc-step-1" class="hidden w-full transition-all duration-300">
      <button onclick="showStep('auth-options')" class="text-gray-500 mb-6 flex items-center gap-1.5 hover:text-gray-900 transition-colors font-bold text-sm btn-press">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back
      </button>
      <h2 class="text-2xl font-black tracking-tight mb-2">Enter Passcode</h2>
      <p class="text-sm text-gray-500 font-medium mb-6">Enter your phone number and 5-digit passcode.</p>
      
      <div class="space-y-4 mb-6">
        <div class="flex gap-2">
          <select id="pc-country" class="bg-white border border-gray-200 p-4 rounded-xl font-bold text-base focus:border-green-600 focus:outline-none w-32 shadow-sm">
            <option value="+260">🇿🇲 +260</option>
            <option value="+255">🇹🇿 +255</option>
          </select>
          <input type="tel" id="pc-phone" placeholder="768 488 494" style="border-color: #e5e7eb;"
            class="flex-1 bg-white border border-gray-200 p-4 rounded-xl font-bold text-base tracking-wide focus:border-green-600 focus:outline-none shadow-sm">
        </div>
        <div class="mb-6">
        <input type="password" id="pc-passcode" placeholder="5-digit Passcode" maxlength="5" style="border-color: #e5e7eb;"
          class="w-full bg-white border p-4 rounded-xl text-center text-2xl font-mono tracking-[0.5em] focus:outline-none shadow-sm">
      </div>
      <p id="pc-error" class="text-red-500 text-xs font-bold text-center mb-3 hidden"></p>
      
      <button onclick="passcodeLogin()" id="btn-passcode-login"
        class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold text-[15px] shadow-sm hover:bg-black transition-colors btn-press">
        Sign In as Agent
      </button>
    </div>
    
    <p class="mt-8 text-[10px] font-bold text-gray-400 text-center uppercase tracking-widest leading-relaxed">
      By continuing, you agree to our <br> <a href="/terms.html" class="text-green-600 hover:text-green-700">Terms of Service</a> & <a href="/policy.html" class="text-green-600 hover:text-green-700">Privacy Policy</a>
    </p>

  </div>

  <script>

    const API_BASE = window.location.origin;
    let activeUserId = null;
    let pinValue = '';

    const allSteps = ['auth-options', 'pc-step-1'];

    function showStep(stepId) {
      allSteps.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('hidden');
      });
      const target = document.getElementById(stepId);
      if (target) {
        target.classList.remove('hidden');
        // Hide header if we are not on main options
        document.getElementById('auth-header').style.display = (stepId === 'auth-options') ? 'block' : 'none';
      }
    }

    // Initialize UI
    showStep('auth-options');

    // ── PIN PAD ───────────────────────────────────────────────────────
    function pinInput(digit) {
      if (pinValue.length >= 5) return;
      pinValue += digit;
      updatePinDots();
      if (pinValue.length === 5) {
        document.getElementById('btn-passcode-login').disabled = false; document.getElementById('btn-passcode-login').classList.remove('opacity-70');
        document.getElementById('btn-passcode-login').classList.remove('opacity-50','cursor-not-allowed');
      }
    }

    function pinDelete() {
      if (pinValue.length === 0) return;
      pinValue = pinValue.slice(0, -1);
      updatePinDots();
      document.getElementById('btn-passcode-login').disabled = true; document.getElementById('btn-passcode-login').classList.add('opacity-70');
      document.getElementById('btn-passcode-login').classList.add('opacity-50','cursor-not-allowed');
      document.getElementById('pc-error').classList.add('hidden');
    }



    async function passcodeLogin() {
      const cc = document.getElementById('pc-country').value;
      let rawPhone = document.getElementById('pc-phone').value.trim();
      if (!rawPhone) {
        showPinError('Please enter your phone number first.');
        document.getElementById('pc-passcode').value = '';
        return;
      }
      const phone = formatPhoneNumber(rawPhone, cc);

      const btn = document.getElementById('btn-passcode-login');
      btn.innerText = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/passcode-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, passcode: document.getElementById('pc-passcode').value })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          processRouting(data.user);
        } else {
          showPinError(data.error || 'Incorrect passcode. Try again.');
          document.getElementById('pc-passcode').value = '';
          btn.innerText = 'Sign In';
          btn.disabled = false;
          btn.classList.add('opacity-50','cursor-not-allowed');
        }
      } catch (err) {
        showPinError('Network error. Please try again.');
        document.getElementById('pc-passcode').value = '';
        btn.innerText = 'Sign In';
        btn.disabled = false;
        btn.classList.add('opacity-50','cursor-not-allowed');
      }
    }

    function showPinError(msg) {
      const el = document.getElementById('pc-error');
      el.innerText = msg;
      el.classList.remove('hidden');
    }

    // ── GOOGLE AUTH ──────────────────────────────────────────────────
    async function handleCredentialResponse(response) {
      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/google/callback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: response.credential })
        });
        const data = await res.json();
        if (data.action === 'REQUIRE_ONBOARDING') {
          // Send them to KYC setup to configure Phone + Passcode
          window.location.href = '/kyc-setup.html?onboarding=true';
        } else if (data.action === 'AUTHENTICATED') {
          processRouting(data.user);
        } else if (data.error) {
          alert('Google Auth Error: ' + data.error);
        } else {
          alert('Unknown error during authentication');
        }
      } catch (err) {
        alert('Network or Server Error: ' + err.message);
      }
    }

    // ── WHATSAPP OTP ─────────────────────────────────────────────────
    function formatPhoneNumber(rawPhone, countryCode) {
      let d = rawPhone.replace(/[^\d+]/g, '');
      if (d.startsWith('+')) return d;
      const cc = countryCode || '+260';
      if (d.startsWith('0')) d = d.slice(1);
      if (cc === '+260') {
        if (d.length === 9) return '+260' + d;
        if (d.length === 10 && d.startsWith('0')) return '+260' + d.slice(1);
        if (d.startsWith('260') && d.length === 12) return '+' + d;
        return '+260' + d;
      }
      if (cc === '+255') {
        if (d.length === 9) return '+255' + d;
        if (d.length === 10 && d.startsWith('0')) return '+255' + d.slice(1);
        if (d.startsWith('255') && d.length === 12) return '+' + d;
        return '+255' + d;
      }
      if (!d.startsWith('+')) d = '+' + d;
      return d;
    }

    function normalizePcPhone() {
      const input = document.getElementById('pc-phone');
      input.value = input.value.replace(/[^\d+\s-]/g, '');
    }

    function updatePcFlag() {
      const cc = document.getElementById('pc-country').value;
      const ph = document.getElementById('pc-phone');
      ph.placeholder = cc === '+255' ? '0754 932 831' : '0977 287 900';
    }

    function updateWaFlag() {
      const cc = document.getElementById('wa-country').value;
      const ph = document.getElementById('wa-phone');
      ph.placeholder = cc === '+255' ? '0754 932 831' : '0977 287 900';
    }

    async function requestOTP(source) {
      let phoneEl, ccEl;
      if (source === 'google') { phoneEl = 'wa-phone-google'; ccEl = null; } 
      else { phoneEl = 'wa-phone'; ccEl = 'wa-country'; }
      let rawPhone = document.getElementById(phoneEl).value.trim();
      const cc = ccEl ? document.getElementById(ccEl).value : '+260';

      if (rawPhone === 'admin' || rawPhone === 'hq') { window.location.href = '/admin-portal.html'; return; }
      if (!rawPhone) return alert('Enter phone number');
      const phone = formatPhoneNumber(rawPhone, cc);
      document.getElementById(phoneEl).value = phone;

      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/whatsapp/initiate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: phone, userId: activeUserId || 'temp_' + Date.now() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to send code');

        if (source === 'google') {
          showStep('auth-step-3');
          document.getElementById('lbl-otp-msg2').innerText = `Code sent to ${phone}`;
          if (data.test_otp) document.getElementById('wa-otp').value = data.test_otp;
        } else {
          showStep('wa-step-2');
          document.getElementById('lbl-wa-otp-msg').innerText = `Code sent to ${phone}`;
          if (data.test_otp) document.getElementById('wa-otp-direct').value = data.test_otp;
        }
      } catch (err) {
        alert(err.message);
      }
    }

    async function verifyAuthOTP() {
      const otp = document.getElementById('wa-otp').value;
      let phone = formatPhoneNumber(document.getElementById('wa-phone-google').value.trim());
      if (!otp || otp.length < 6) return alert('Enter 6-digit code');
      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/whatsapp/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: activeUserId, inputOtp: otp, userProvidedPhone: phone })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to verify');
        processRouting(data.user);
      } catch (err) { alert('Verification failed: ' + err.message); }
    }

    async function verifyWAOTP() {
      const otp = document.getElementById('wa-otp-direct').value;
      let phone = formatPhoneNumber(document.getElementById('wa-phone').value.trim());
      if (!otp || otp.length < 6) return alert('Enter 6-digit code');
      try {
        const btn = document.getElementById('btn-verify-otp');
        btn.innerText = 'Verifying...';
        const res = await fetch(`${API_BASE}/api/v1/auth/whatsapp/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: null, inputOtp: otp, userProvidedPhone: phone })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to verify');
        processRouting(data.user);
      } catch (err) { 
        alert('Verification failed: ' + err.message);
        document.getElementById('btn-verify-otp').innerText = 'Verify & Enter';
      }
    }

    function resetAuth() {
      showStep('auth-options');
      document.getElementById('wa-otp').value = '';
      document.getElementById('wa-otp-direct').value = '';
    }

    // ── ROUTING ───────────────────────────────────────────────────────
    async function processRouting(userObj) {
      if (!userObj) return;
      let role = userObj.role || 'BUYER';
      const pendingInviteCode = localStorage.getItem('pending_invite_code');
      if (pendingInviteCode && (role === 'BUYER' || role === 'MEMBER')) {
        try {
          const res = await fetch(`${API_BASE}/api/v1/groups/join`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userObj.user_id, invite_code: pendingInviteCode })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('activeGroupId', data.group_id);
            localStorage.setItem('activeGroupName', data.group_name);
            localStorage.setItem('activeGroupRole', 'MEMBER');
            localStorage.removeItem('pending_invite_code');
            alert(`Joined "${data.group_name}" successfully!`);
            window.location.href = '/group-cart.html';
            return;
          }
        } catch (err) {}
      }
      switch (role) {
        case 'SUPER_ADMIN': window.location.href = '/admin-portal.html'; break;
        case 'AGENT': window.location.href = '/vendor-dashboard.html'; break;
        case 'COURIER': window.location.href = '/runner-portal.html'; break;
        case 'BUYER': default:
          window.location.href = localStorage.getItem('activeGroupId') ? '/dashboard.html' : '/';
          break;
      }
    }
  
  </script>
</body>
</html>
