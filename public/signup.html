<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Chilimba</title>
  <meta name="theme-color" content="#15803d">
  <link rel="manifest" href="/manifest.json">
  <link href="/assets/css/tailwind.css" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .btn-press:active { transform: scale(0.95); transition: transform 0.1s; }
  </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-[100dvh] p-4">

  <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm overflow-hidden border border-gray-100 p-8 text-center relative">
    
    <!-- Top graphic -->
    <div class="w-20 h-20 bg-green-100 text-green-700 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path>
      </svg>
    </div>

    <h2 class="text-3xl font-black text-gray-900 mb-2 tracking-tight">Chilimba Access</h2>
    <p class="text-sm font-medium text-gray-500 mb-8">One secure login for Buyers, Agents, and Couriers.</p>

    <div id="auth-step-1">
      <div id="g_id_onload"
           data-client_id="714011063581-ki9st10fiap43pjgpu44ur41qg2ahnjr.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin flex justify-center mb-6" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="center"></div>
      
      <div class="relative flex py-2 items-center mb-6">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="flex-shrink-0 mx-4 text-gray-400 text-xs font-bold uppercase tracking-widest">Or use phone</span>
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <input type="tel" id="wa-phone" placeholder="Enter Phone Number (+260...)" class="w-full border-2 border-gray-200 bg-gray-50 p-4 rounded-xl text-center font-bold tracking-wide focus:border-green-600 focus:bg-white focus:outline-none mb-3">
      <button onclick="requestOTP()" id="btn-request-otp" class="w-full bg-green-700 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-green-800 transition-colors btn-press flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"></path></svg>
        Login with WhatsApp
      </button>
    </div>

    <div id="auth-step-2" class="hidden">
       <p class="text-sm font-bold text-gray-900 mb-1">Enter Security Code</p>
       <p class="text-xs text-gray-500 mb-6 font-medium" id="lbl-otp-msg">We sent a 6-digit code to your WhatsApp</p>
       <input type="text" id="wa-otp" maxlength="6" placeholder="------" class="w-full border-2 border-gray-200 bg-gray-50 p-4 rounded-xl text-center text-3xl font-mono tracking-[0.5em] focus:bg-white focus:border-green-600 focus:outline-none mb-6">
       <button onclick="verifyAuthOTP()" id="btn-verify-otp" class="w-full bg-green-700 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-green-800 transition-colors btn-press">Verify & Enter</button>
       <button onclick="resetAuth()" class="mt-4 text-xs font-bold text-gray-500 hover:text-gray-800 btn-press">Cancel</button>
    </div>

    <div class="mt-8 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
      <p>By logging in, you agree to our Terms & Privacy Policy.</p>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let activeUserId = null;

    async function handleCredentialResponse(response) {
      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/google/callback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: response.credential })
        });
        const data = await res.json();
        
        if (data.action === 'REQUIRE_WHATSAPP_LINK') {
          activeUserId = data.userId;
          document.getElementById('auth-step-1').classList.add('hidden');
          document.getElementById('auth-step-2').classList.remove('hidden');
        } else if (data.action === 'AUTHENTICATED') {
          processRouting(data.user);
        }
      } catch (err) {
        alert('Google Authentication failed.');
      }
    }

    async function requestOTP() {
      const phone = document.getElementById('wa-phone').value.trim();
      if(!phone) return alert("Enter phone number");
      
      // Temporary check for super admin override
      if(phone === 'admin' || phone === 'hq') {
        window.location.href = '/admin-portal.html';
        return;
      }
      
      const btn = document.getElementById('btn-request-otp');
      btn.innerHTML = '<div class="animate-spin h-5 w-5 border-2 border-white rounded-full mr-2 border-t-transparent"></div> Sending...';
      btn.disabled = true;
      
      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/whatsapp/initiate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          // Send phone number. We might not have a userId if they didn't do Google Auth first.
          // In a real flow, you might create a pending user row here.
          body: JSON.stringify({ phoneNumber: phone, userId: activeUserId || 'temp_' + Date.now() })
        });
        
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "Failed to send code");
        
        document.getElementById('auth-step-1').classList.add('hidden');
        document.getElementById('auth-step-2').classList.remove('hidden');
        document.getElementById('lbl-otp-msg').innerText = `We sent a code to ${phone}`;
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M..."></path></svg> Login with WhatsApp';
      }
    }

    async function verifyAuthOTP() {
      const otp = document.getElementById('wa-otp').value;
      const phone = document.getElementById('wa-phone').value.trim();
      
      if(!otp || otp.length < 6) return alert("Enter 6-digit code");

      const btn = document.getElementById('btn-verify-otp');
      btn.innerHTML = '<div class="animate-spin h-5 w-5 border-2 border-white rounded-full border-t-transparent"></div>';
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/v1/auth/whatsapp/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: activeUserId, inputOtp: otp, userProvidedPhone: phone })
        });
        
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "Failed to verify");
        
        processRouting(data.user);
      } catch(err) {
        alert('Verification failed: ' + err.message);
        btn.disabled = false;
        btn.innerText = 'Verify & Enter';
      }
    }

    function processRouting(userObj) {
      if(!userObj) return;
      
      // Look at userObj.role if it exists, otherwise use phone rules for demo
      let role = userObj.role || 'BUYER';
      if(!userObj.role) {
         if(userObj.phone_number?.includes('255')) role = 'AGENT';
         if(userObj.phone_number?.includes('8821')) role = 'COURIER';
      }
      
      switch(role) {
        case 'SUPER_ADMIN':
          window.location.href = '/admin-portal.html';
          break;
        case 'AGENT':
          window.location.href = '/vendor-dashboard.html';
          break;
        case 'COURIER':
          window.location.href = '/runner-portal.html';
          break;
        case 'BUYER':
        default:
          if(localStorage.getItem('activeGroupId')) {
             window.location.href = '/dashboard.html';
          } else {
             window.location.href = '/';
          }
          break;
      }
    }

    function resetAuth() {
      document.getElementById('auth-step-2').classList.add('hidden');
      document.getElementById('auth-step-1').classList.remove('hidden');
      document.getElementById('wa-otp').value = '';
    }
  </script>
</body>
</html>
